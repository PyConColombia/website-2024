<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/static/css/styles.css" rel="stylesheet" />
</head>

<body>
    <!-- Alerts -->
    <div class="alert alert-warning alert-news" role="alert">
        <div class="ticker-wrapper">
            <div class="ticker">
                <div class="ticker__item">Early birds tickets on sale now!</div>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-expand-md sticky-top bg-body-tertiary navbar-main">
        <div class="container-lg">
            <a class="navbar-brand" href="#"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Location</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Keynotes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Speakers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sponsors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Team</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn" type="submit">Register</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Index -->
    <section id="index">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-11 col-10">
                    <div class="title-container">
                        <h2 class="title">
                            <span class="bold">Del 23 al 30 de Junio |</span><span> Medellín - Colombia</span>
                        </h2>
                        <img src="/static/images/pycon-title.svg" alt="Python Logo" />
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Topics -->
    <section id="topics">
        <h1>Topics</h1>
    </section>

    <!-- Data -->
    <section id="data">
        <h1>Data</h1>
    </section>

    <!-- Proposals -->
    <section id="proposals">
        <h1>Proposals</h1>
    </section>

    <!-- Sponsors -->
    <section id="sponsors">
        <h1>Sponsors</h1>
    </section>

    <!-- Contact -->
    <section id="contact">
        <h1>Contact</h1>
    </section>

    <!-- Footer -->
    <footer>
        &copy; Copyright 2023 by Python Colombia.
    </footer>

    <!-- Scripts -->
    <script type="text/javascript" src="/static/js/popper.min.js"></script>
    <script type="text/javascript" src="/static/js/bootstrap.bundle.min.js"></script>
</body>

</html>
